name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
 
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Verify HTML File Exists
        run: test -f index.html && echo "✅ HTML found" || echo "❌ HTML missing"
      
      - name: Verify CSS File Exists
        run: test -f style.css && echo "✅ CSS found" || echo "❌ CSS missing"
      
      - name: Verify JavaScript File Exists
        run: test -f script.js && echo "✅ JS found" || echo "❌ JS missing"
      
      - name: CI Successful
        run: echo "🎉 All tests passed! Website ready for deployment"

  
  deploy:
    needs: test
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4