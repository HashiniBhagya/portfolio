<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hashini Bhagya | Undergraduate</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    
    <div class="tech-bg">
        <div class="grid-overlay"></div>
        <div class="matrix-rain"></div>
        <div class="particles-container"></div>
        <div class="circuit-lines"></div>
        <div class="floating-binary"></div>
        <div class="tech-circles"></div>
        <div class="gradient-orb"></div>
        <div class="neon-glow"></div>
    </div>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-text">&lt;/&gt;</span>
                <span>Hashini Bhagya</span>
            </div>
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#education">Education</a></li>
                <li><a href="#skills">Skills</a></li>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
            <div class="nav-actions">
                <button class="theme-toggle" id="themeToggle">
                    <i class="fas fa-moon"></i>
                </button>
                <div class="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
    </nav>

    <main>
       
        <section id="home" class="section hero">
            <div class="container">
                <div class="hero-content">
                    <div class="hero-text">
                        <h1 class="glow-text">Hashini Bhagya</h1>
                        <div class="typed-container">
                            <span class="prefix">I'm a </span>
                            <span class="typed-text" id="typed"></span>
                            <span class="cursor">|</span>
                        </div>
                        <p class="hero-description">
                            Passionate Undergraduate Student crafting innovative digital solutions. 
                            Specialized in modern web technologies, database systems, and software engineering.
                        </p>
                        <div class="hero-buttons">
                            <a href="#contact" class="btn btn-primary">
                                <i class="fas fa-paper-plane"></i> Hire Me
                            </a>
                            <a href="assets/resume.pdf" class="btn btn-secondary" download>
                                <i class="fas fa-download"></i> Download CV
                            </a>
                        </div>
                        <div class="social-links">
                            <a href="#"><i class="fab fa-github"></i></a>
                            <a href="#"><i class="fab fa-linkedin-in"></i></a>
                            <a href="#"><i class="fab fa-twitter"></i></a>
                            <a href="#"><i class="fab fa-whatsapp"></i></a>
                            <a href="#"><i class="fas fa-envelope"></i></a>
                        </div>
                    </div>
                    <div class="hero-image">
                        <div class="profile-wrapper">
                            <div class="profile-container">
                                <img src="assets/portfolio.jpg" alt="Hashini Bhagya" class="profile-photo">
                                <div class="profile-glow"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
